<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Checkout | BioZymGrow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f5f7f9; }
    .box {
      background:#fff;
      border-radius:14px;
      padding:20px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand fw-bold" href="keranjang.html">⬅ Checkout</a>
  </div>
</nav>

<div class="container py-4">
  <h4 class="fw-bold mb-3">📦 Checkout</h4>

  <div class="row g-4">
    <!-- DATA PEMBELI -->
    <div class="col-lg-7">
      <div class="box mb-3">
        <h6 class="fw-bold mb-3">Data Penerima</h6>
        <input class="form-control mb-2" id="nama" placeholder="Nama lengkap">
        <input class="form-control mb-2" id="hp" placeholder="No. HP">
        <textarea class="form-control" id="alamat" placeholder="Alamat lengkap"></textarea>
      </div>

      <div class="box">
        <h6 class="fw-bold mb-3">Pengiriman</h6>
        <select class="form-select mb-2" id="ekspedisi" onchange="updateOngkir()">
          <option value="">Pilih ekspedisi</option>
          <option value="jne">JNE</option>
          <option value="jnt">J&T</option>
          <option value="sicepat">SiCepat</option>
        </select>

        <select class="form-select" id="layanan" onchange="updateOngkir()">
          <option value="">Pilih layanan</option>
          <option value="reg">Reguler</option>
          <option value="exp">Express</option>
        </select>
      </div>
    </div>

    <!-- RINGKASAN -->
    <div class="col-lg-5">
      <div class="box">
        <h6 class="fw-bold mb-3">Ringkasan</h6>
        <div class="d-flex justify-content-between mb-2">
          <span>Subtotal</span>
          <span id="subtotal">Rp0</span>
        </div>
        <div class="d-flex justify-content-between mb-2">
          <span>Ongkir</span>
          <span id="ongkir">Rp0</span>
        </div>
        <hr>
        <div class="d-flex justify-content-between fw-bold mb-3">
          <span>Total</span>
          <span id="total">Rp0</span>
        </div>

        <button class="btn btn-success w-100 rounded-pill"
          onclick="konfirmasiPesanan()">
          Konfirmasi Pesanan
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const products = [
  { id:1, price:10000 },
  { id:2, price:18000 },
  { id:3, price:30000 }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let subtotal = cart.reduce((sum, i) => {
  const p = products.find(p => p.id === i.id);
  return sum + (p ? p.price * i.qty : 0);
}, 0);

document.getElementById("subtotal").innerText =
  "Rp" + subtotal.toLocaleString("id-ID");

let ongkir = 0;

function updateOngkir() {
  const layanan = document.getElementById("layanan").value;
  ongkir = layanan === "exp" ? 20000 : layanan === "reg" ? 12000 : 0;
  document.getElementById("ongkir").innerText =
    "Rp" + ongkir.toLocaleString("id-ID");
  document.getElementById("total").innerText =
    "Rp" + (subtotal + ongkir).toLocaleString("id-ID");
}

function konfirmasiPesanan() {
  const dataPesanan = {
    nama: nama.value,
    hp: hp.value,
    alamat: alamat.value,
    subtotal,
    ongkir,
    total: subtotal + ongkir
  };

  localStorage.setItem("checkout", JSON.stringify(dataPesanan));
  window.location.href = "pembayaran.html";
}

updateOngkir();
</script>

</body>
</html>
